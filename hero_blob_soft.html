
<style>
#wrap { position: relative; width: 100%; height: 600px; border-radius: 12px; overflow: hidden; background: #000; }
#c { display: block; width: 100%; height: 100%; will-change: transform; filter: blur(6px); }
#cblur { position: absolute; inset: 0; width: 100%; height: 100%; filter: blur(22px); opacity: 0.55; will-change: transform; pointer-events: none; }
</style>
<div id="wrap">
  <canvas id="c"></canvas>
  <canvas id="cblur"></canvas>
</div>
<script>
const sharp = document.getElementById('c');
const blurry = document.getElementById('cblur');
const ctx = sharp.getContext('2d');
const ctx2 = blurry.getContext('2d');
let W, H, t = 0, last = 0;
const FPS = 40, INTERVAL = 1000 / FPS;
const STEPS = 100;

function resize() {
  const rect = sharp.getBoundingClientRect();
  const dpr = Math.min(devicePixelRatio, 2);
  W = sharp.width = blurry.width = rect.width * dpr;
  H = sharp.height = blurry.height = rect.height * dpr;
  sharp.style.width = blurry.style.width = rect.width + 'px';
  sharp.style.height = blurry.style.height = rect.height + 'px';
}

function noise(x, y, t) {
  return (
    Math.sin(x * 2.1 + t * 0.7) * Math.cos(y * 1.8 - t * 0.5) +
    Math.sin(x * 3.3 - t * 0.4 + y * 1.2) * 0.5 +
    Math.cos(x * 1.5 + y * 2.7 + t * 0.9) * 0.3
  ) / 1.8;
}

function drawBlob(c, cx, cy, baseR, t, alpha, hue, sat, light, seed, scaleY, warp) {
  const pulse = 1 + Math.sin(t * 1.1 + seed) * 0.08 + Math.sin(t * 0.6 + seed * 0.5) * 0.05;
  c.beginPath();
  for (let i = 0; i <= STEPS; i++) {
    const angle = (i / STEPS) * Math.PI * 2;
    const nx = Math.cos(angle + seed) * 1.2;
    const ny = Math.sin(angle + seed) * 1.2;
    const n = noise(nx, ny, t + seed);
    const r = baseR * pulse * (1 + n * warp);
    const x = cx + Math.cos(angle) * r;
    const y = cy + Math.sin(angle) * r * scaleY;
    i === 0 ? c.moveTo(x, y) : c.lineTo(x, y);
  }
  c.closePath();
  const g = c.createRadialGradient(cx - baseR * 0.2, cy - baseR * 0.15, 0, cx, cy, baseR * 1.5);
  g.addColorStop(0, `hsla(${hue+15},${sat}%,${light+18}%,${alpha})`);
  g.addColorStop(0.5, `hsla(${hue},${sat}%,${light}%,${alpha * 0.85})`);
  g.addColorStop(1, `hsla(${hue-10},${sat-10}%,${light-12}%,0)`);
  c.fillStyle = g;
  c.fill();
}

function drawGlow(c, cx, cy, baseR, t) {
  const pulse = 1 + Math.sin(t * 1.1) * 0.1;
  for (let i = 2; i >= 1; i--) {
    const r = baseR * (2.0 + i * 0.9) * pulse;
    const g = c.createRadialGradient(cx, cy, baseR * 0.3, cx, cy, r);
    g.addColorStop(0, `rgba(255,90,15,${0.12 / i})`);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    c.beginPath();
    c.arc(cx, cy, r, 0, Math.PI * 2);
    c.fillStyle = g;
    c.fill();
  }
}

function drawRings(c, cx, cy, baseR, t) {
  const pulse = 1 + Math.sin(t * 1.1) * 0.06;
  [2.2, 3.4].forEach((mult, i) => {
    const r = baseR * mult * pulse;
    c.beginPath();
    c.arc(cx, cy, r, 0, Math.PI * 2);
    c.strokeStyle = `rgba(255,110,30,${0.07 - i * 0.02})`;
    c.lineWidth = 0.8;
    c.stroke();
  });
}

function frame(now) {
  requestAnimationFrame(frame);
  if (now - last < INTERVAL) return;
  last = now;
  t += 0.013;

  const cx = W * 0.5, cy = H * 0.5;
  const baseR = Math.min(W, H) * 0.26;

  ctx.clearRect(0, 0, W, H);
  drawGlow(ctx, cx, cy, baseR, t);
  drawRings(ctx, cx, cy, baseR, t);
  drawBlob(ctx, cx, cy, baseR, t, 0.82, 18, 100, 45, 0, 0.85, 0.32);
  drawBlob(ctx, cx, cy, baseR * 0.55, t * 1.3, 0.95, 30, 100, 58, 0, 0.85, 0.32);

  ctx2.clearRect(0, 0, W, H);
  drawBlob(ctx2, cx, cy, baseR * 1.9, t * 0.35 + 2.0, 0.55, 8, 85, 28, 1.1, 0.8, 0.22);
  drawBlob(ctx2, cx, cy, baseR * 1.28, t * 0.7 + 1.5, 0.65, 10, 90, 35, 0, 0.85, 0.32);
}

resize();
window.addEventListener('resize', resize);
requestAnimationFrame(frame);
</script>
